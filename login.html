<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MF Rappels">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#6366f1">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Motors Factory — Rappels</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#6366f1,#8b5cf6);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.login-box{background:#fff;border-radius:24px;padding:2rem;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(99,102,241,0.3);}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;justify-content:center;}
.logo-icon{width:50px;height:50px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;}
.logo-text{font-size:18px;font-weight:900;color:#1e1b4b;}
.logo-sub{font-size:11px;color:#a5b4fc;font-weight:600;}
h2{font-size:16px;font-weight:800;color:#1e1b4b;text-align:center;margin-bottom:1.5rem;}
label{font-size:11px;font-weight:800;color:#a5b4fc;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}
input[type=password]{width:100%;background:#f0f4ff;border:2px solid #e0e7ff;border-radius:12px;padding:12px 14px;font-size:15px;font-family:'Nunito',sans-serif;color:#1e1b4b;margin-bottom:1rem;outline:none;}
input[type=password]:focus{border-color:#6366f1;}
.login-btn{width:100%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;padding:14px;border-radius:12px;font-size:15px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;}
.login-btn:active{transform:scale(0.98);}
.erreur{background:#fee2e2;border:1.5px solid #fca5a5;border-radius:8px;padding:8px 12px;font-size:13px;color:#dc2626;font-weight:700;text-align:center;margin-bottom:1rem;display:none;}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <div class="logo-icon">📞</div>
    <div>
      <div class="logo-text">Motors Factory</div>
      <div class="logo-sub">Rappels clients</div>
    </div>
  </div>
  <h2>Connexion requise</h2>
  <div class="erreur" id="erreur">Mot de passe incorrect</div>
  <label>Mot de passe</label>
  <input type="password" id="pwd" placeholder="••••••••••" onkeydown="if(event.key==='Enter')verifier()"/>
  <button class="login-btn" onclick="verifier()">Accéder</button>
</div>
<script>
const HASH = "dd8985ffcf5ce1ce924642d5a9c20f649bac2a5bd5487aca1df43e3bce235065";
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function verifier() {
  const pwd = document.getElementById('pwd').value;
  const h = await sha256(pwd);
  if(h === HASH) {
    sessionStorage.setItem('mf_auth', '1');
    location.reload();
  } else {
    document.getElementById('erreur').style.display='block';
    document.getElementById('pwd').value='';
  }
}
if(sessionStorage.getItem('mf_auth')==='1') {
  document.body.style.display='none';
}
</script>
</body>
</html>
